name: "Pipeline Integral de Testing Avanzado"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

# Variable de entorno global para resolver el problema de certificados SSL
# en entornos Node.js con proxy/red corporativa.
env:
  NODE_OPTIONS: "--use-system-ca"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Análisis Estático — ESLint
  # ───────────────────────────────────────────────────────────────────────────
  static-analysis:
    name: "1 · Análisis Estático (ESLint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modulo2/package-lock.json

      - name: Instalar dependencias de Módulo 2
        working-directory: modulo2
        run: npm ci --no-audit --no-fund

      - name: Ejecutar ESLint
        working-directory: modulo2
        run: npm run lint

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Pruebas Unitarias Jasmine (Módulo 1)
  # ───────────────────────────────────────────────────────────────────────────
  jasmine-tests:
    name: "2 · Pruebas Unitarias (Jasmine)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias raíz
        run: npm ci --no-audit --no-fund

      - name: Instalar fast-check
        run: npm install fast-check --no-audit --no-fund

      - name: Ejecutar suite Jasmine estándar
        run: npx jasmine spec/busquedaBinaria.spec.js

      - name: Ejecutar suite Jasmine avanzada (PBT + Contract)
        run: npx jasmine spec/busquedaBinaria.advanced.spec.js

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Cobertura de Código — Jest (Módulo 2)
  # ───────────────────────────────────────────────────────────────────────────
  jest-coverage:
    name: "3 · Cobertura de Código (Jest)"
    runs-on: ubuntu-latest
    needs: jasmine-tests

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modulo2/package-lock.json

      - name: Instalar dependencias de Módulo 2
        working-directory: modulo2
        run: npm ci --no-audit --no-fund

      - name: Ejecutar Jest con cobertura completa (100%)
        working-directory: modulo2
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":100,"functions":100,"lines":100,"statements":100}}'

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: modulo2/coverage/lcov-report/

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4: Pruebas de Mutación — Stryker
  # ───────────────────────────────────────────────────────────────────────────
  mutation-testing:
    name: "4 · Mutation Testing (Stryker)"
    runs-on: ubuntu-latest
    needs: jest-coverage

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias raíz + Stryker
        run: |
          npm ci --no-audit --no-fund
          npm install --save-dev \
            @stryker-mutator/core \
            @stryker-mutator/jasmine-runner \
            fast-check \
            --no-audit --no-fund

      - name: Ejecutar Stryker (Mutation Testing)
        run: npx stryker run

      - name: Subir reporte de mutaciones como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/html/

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5: Orquestador ML — Python (Módulo 3)
  # ───────────────────────────────────────────────────────────────────────────
  ml-orchestrator:
    name: "5 · Orquestador ML (Python)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: modulo3-ml/requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r modulo3-ml/requirements.txt

      - name: Ejecutar orquestador combinatorio + ML
        working-directory: modulo3-ml
        run: python orchestrator.py

      - name: Subir reporte de riesgo como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: risk-report
          path: modulo3-ml/reporte_riesgo.json

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6: Resumen Final
  # ───────────────────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "6 · Resumen del Pipeline"
    runs-on: ubuntu-latest
    needs:
      - static-analysis
      - jasmine-tests
      - jest-coverage
      - mutation-testing
      - ml-orchestrator
    if: always()

    steps:
      - name: Mostrar estado de todos los jobs
        run: |
          echo "═══════════════════════════════════════"
          echo "  RESUMEN PIPELINE - Testing Avanzado"
          echo "═══════════════════════════════════════"
          echo "1. Análisis Estático (ESLint) : ${{ needs.static-analysis.result }}"
          echo "2. Pruebas Jasmine            : ${{ needs.jasmine-tests.result }}"
          echo "3. Cobertura Jest             : ${{ needs.jest-coverage.result }}"
          echo "4. Mutation Testing (Stryker) : ${{ needs.mutation-testing.result }}"
          echo "5. Orquestador ML Python      : ${{ needs.ml-orchestrator.result }}"
          echo "═══════════════════════════════════════"
