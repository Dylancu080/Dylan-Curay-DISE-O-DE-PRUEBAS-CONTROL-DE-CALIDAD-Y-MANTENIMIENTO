name: "Testing Pipeline"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  NODE_OPTIONS: "--use-system-ca"

jobs:
  static-analysis:
    name: "ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modulo2/package-lock.json
      - name: Install
        working-directory: modulo2
        run: npm install --no-audit --no-fund
      - name: Lint
        working-directory: modulo2
        run: npm run lint
        continue-on-error: true

  jasmine-tests:
    name: "Jasmine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Jasmine base
        run: npx jasmine spec/busquedaBinaria.spec.js
      - name: Jasmine advanced
        run: npx jasmine spec/busquedaBinaria.advanced.spec.js

  jest-coverage:
    name: "Jest coverage"
    runs-on: ubuntu-latest
    needs: jasmine-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modulo2/package-lock.json
      - name: Install
        working-directory: modulo2
        run: npm install --no-audit --no-fund
      - name: Coverage
        working-directory: modulo2
        run: npx jest parte2-cobertura/binarySearch.test.js --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: modulo2/coverage/lcov-report/

  mutation-testing:
    name: "Stryker"
    runs-on: ubuntu-latest
    needs: jest-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Mutation
        run: npx stryker run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/

  ml-orchestrator:
    name: "Python ML"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: modulo3-ml/requirements.txt
      - name: Install
        run: pip install -r modulo3-ml/requirements.txt
      - name: Run
        working-directory: modulo3-ml
        run: python orchestrator.py
      - uses: actions/upload-artifact@v4
        with:
          name: risk-report
          path: modulo3-ml/reporte_riesgo.json
